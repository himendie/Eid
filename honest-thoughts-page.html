<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>A Few Honest Things</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Caveat:wght@400;500;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

    :root{
      --cream:#fdf8f2;
      --cream2:#f9f0e6;
      --peach:#f5d5c0;
      --pink:#f2c4c4;
      --brown:#b07d62;
      --brown-dk:#5c3d2e;
      --brown-mid:#8a6550;
      --brown-lt:#c4a08a;
      --tape-peach:rgba(245,213,192,.82);
      --tape-blue:rgba(196,220,242,.78);
      --tape-pink:rgba(242,196,196,.80);
    }

    body{
      min-height:100vh;overflow-x:hidden;
      font-family:'Poppins',sans-serif;
      background-color:var(--cream);
      background-image:
        radial-gradient(ellipse at 8% 10%, rgba(245,213,192,.50) 0%,transparent 40%),
        radial-gradient(ellipse at 92% 88%, rgba(242,196,196,.36) 0%,transparent 38%),
        radial-gradient(ellipse at 52% 46%, rgba(255,243,230,.38) 0%,transparent 52%);
      color:var(--brown-dk);
      position:relative;
    }

    /* paper grain */
    .paper-grain{
      position:fixed;inset:0;
      background-image:url("https://www.transparenttextures.com/patterns/cream-paper.png");
      opacity:.20;z-index:1;pointer-events:none;
    }
    /* journal margin line */
    .margin-line{
      position:fixed;top:0;bottom:0;left:52px;
      width:1px;background:rgba(163,112,85,.12);
      z-index:2;pointer-events:none;
    }

    /* ── page ── */
    .page{
      position:relative;z-index:5;
      width:100%;min-height:100vh;
      display:flex;align-items:center;justify-content:center;
      padding:72px 32px 80px 72px;
    }

    /* ── two-column layout ── */
    .layout{
      width:100%;max-width:1020px;
      display:grid;
      grid-template-columns:1fr 290px;
      gap:56px;
      align-items:start;
    }

    /* ════════════════════
       LEFT: thought stream
    ════════════════════ */
    .left{position:relative;}

    .page-label{
      display:inline-flex;align-items:center;gap:7px;
      font-family:'Caveat',cursive;font-size:1.05rem;font-weight:600;
      color:var(--brown);opacity:.80;margin-bottom:16px;letter-spacing:.3px;
    }
    .page-label::before{
      content:'';display:inline-block;
      width:22px;height:2px;
      background:var(--peach);border-radius:2px;
    }

    .heading{
      font-family:'Lora',serif;
      font-size:2.65rem;line-height:1.22;
      font-weight:600;color:var(--brown-dk);
      letter-spacing:-.3px;margin-bottom:32px;
    }
    .heading em{font-style:italic;color:var(--brown);}

    /* ── journal card holding the thoughts ── */
    .journal-card{
      position:relative;
      padding:36px 34px 32px;
      background:rgba(255,252,246,.80);
      border:1.2px solid rgba(210,180,155,.24);
      border-radius:18px;
      box-shadow:
        0 2px 0 rgba(255,255,255,.90),
        0 8px 30px rgba(140,80,60,.07),
        inset 0 1px 0 rgba(255,255,255,.88);
      /* ruled lines */
      background-image:repeating-linear-gradient(
        to bottom,transparent,transparent 33px,
        rgba(163,112,85,.055) 33px,rgba(163,112,85,.055) 34px
      );
      background-position:0 54px;
    }

    /* tape on card */
    .card-tape{
      position:absolute;top:-11px;left:36px;
      width:70px;height:21px;
      background:var(--tape-peach);
      border-radius:3px;transform:rotate(-1.2deg);
      box-shadow:0 1px 4px rgba(0,0,0,.07);
      background-image:repeating-linear-gradient(
        90deg,rgba(255,255,255,.28) 0,rgba(255,255,255,.28) 2px,
        transparent 2px,transparent 6px
      );
    }

    /* ── typewriter terminal ── */
    .terminal{
      position:relative;z-index:1;
      display:flex;flex-direction:column;
      gap:18px;
      min-height:260px;
    }

    .thought-line{
      font-family:'Lora',serif;
      font-size:1.08rem;line-height:1.90;
      color:var(--brown-dk);
      font-weight:400;
      letter-spacing:.15px;
      opacity:0;
      animation:lineIn .5s cubic-bezier(.22,.8,.36,1) forwards;
    }
    @keyframes lineIn{
      from{opacity:0;transform:translateY(5px);}
      to{opacity:1;transform:translateY(0);}
    }

    /* first line — handwritten Caveat for emotional warmth */
    .thought-line.caveat-style{
      font-family:'Caveat',cursive;
      font-size:1.30rem;
      font-weight:600;
      color:var(--brown);
    }

    /* blinking cursor */
    .cursor{
      display:inline-block;width:2px;height:1em;
      background:var(--brown);margin-left:3px;
      vertical-align:middle;
      animation:blink .82s step-end infinite;
    }
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

    /* ── small handwritten note below card ── */
    .card-footnote{
      margin-top:18px;
      font-family:'Caveat',cursive;
      font-size:1.08rem;font-weight:500;
      color:var(--brown-lt);
      letter-spacing:.3px;
      padding-left:4px;
      opacity:.78;
    }

    /* ════════════════════
       RIGHT: sticker column
    ════════════════════ */
    .right{
      position:relative;
      height:460px;
      /* soft paper bg */
      background:rgba(253,248,242,.50);
      border:1.2px dashed rgba(163,112,85,.16);
      border-radius:20px;
      padding:16px;
    }

    /* sticker wrappers */
    .stk{
      position:absolute;
      overflow:hidden;
      border-radius:14px;
      filter:drop-shadow(0 5px 16px rgba(140,80,60,.13));
      pointer-events:none;user-select:none;
      animation:sFloat 8s ease-in-out infinite;
    }
    .stk img{display:block;position:absolute;}

    @keyframes sFloat{
      0%,100%{transform:translateY(0) rotate(var(--rot,0deg));}
      50%{transform:translateY(-11px) rotate(var(--rot,0deg));}
    }

    /* S1 portrait — large, top */
    .sk1{
      --rot:3deg;
      width:148px;height:148px;
      top:22px;right:18px;
      border-radius:50%;
      box-shadow:0 0 0 4px #fff,0 5px 18px rgba(140,80,60,.12);
      animation-delay:0s;
    }
    .sk1 img{
      width:100%;height:100%;
      object-fit:cover;object-position:center 12%;
      border-radius:50%;display:block;position:static;
    }

    /* S2 top-left thoughtful pose */
    .sk2{
      --rot:-4deg;
      width:108px;height:102px;
      top:185px;left:18px;
      animation-delay:1.4s;
    }
    .sk2 img{width:290px;top:-4px;left:-4px;}

    /* S3 bottom sitting girl */
    .sk3{
      --rot:3deg;
      width:102px;height:106px;
      bottom:28px;right:22px;
      animation-delay:2.6s;
    }
    .sk3 img{width:360px;top:-148px;left:-4px;}

    /* S2 peace-sign bottom-left */
    .sk4{
      --rot:-3deg;
      width:95px;height:96px;
      bottom:34px;left:14px;
      animation-delay:3.8s;
    }
    .sk4 img{width:290px;top:-4px;left:-150px;}

    /* page corner decos */
    .deco{
      position:absolute;
      font-family:'Caveat',cursive;
      color:var(--brown-lt);
      opacity:.28;pointer-events:none;
      animation:sway 9s ease-in-out infinite;
      z-index:3;
    }
    @keyframes sway{0%,100%{transform:rotate(-3deg);}50%{transform:rotate(3deg);}}

    /* right column scattered deco */
    .r-deco{
      position:absolute;
      font-family:'Caveat',cursive;
      color:var(--brown-lt);
      font-size:.95rem;
      opacity:.32;pointer-events:none;
      z-index:4;
    }

    /* ── page entry animation ── */
    .left {animation:pageIn .9s cubic-bezier(.22,.8,.36,1) both;}
    .right{animation:pageIn .9s cubic-bezier(.22,.8,.36,1) .18s both;}
    @keyframes pageIn{
      from{opacity:0;transform:translateY(18px);}
      to{opacity:1;transform:translateY(0);}
    }

    /* ── responsive ── */
    @media(max-width:860px){
      .page{padding:56px 22px 72px;}
      .layout{grid-template-columns:1fr;gap:40px;}
      .margin-line{display:none;}
      .heading{font-size:2.25rem;}
      .right{height:320px;max-width:400px;margin:0 auto;width:100%;}
      .sk1{width:118px;height:118px;top:16px;right:14px;}
      .sk2{width:88px;height:84px;top:145px;left:12px;}
      .sk3{width:86px;height:90px;bottom:18px;right:16px;}
      .sk4{width:82px;height:82px;bottom:22px;left:10px;}
      .sk2 img{width:240px;}
      .sk3 img{width:300px;top:-124px;}
      .sk4 img{width:240px;left:-126px;}
    }
    @media(max-width:520px){
      .page{padding:44px 16px 64px;}
      .heading{font-size:1.9rem;}
      .journal-card{padding:28px 20px 24px;}
      .thought-line{font-size:.98rem;}
      .thought-line.caveat-style{font-size:1.18rem;}
      .right{height:260px;}
      .sk2,.sk3,.sk4{display:none;}
      .sk1{width:100px;height:100px;top:12px;right:50%;transform:translateX(50%);}
    }

    /* sticker refresh: full transparent PNGs, placed as soft scrapbook accents */
    .sticker-wrap,.stk,.sticker,.mini-stk,.bg-stk-left,.bg-stk-right{
      overflow:visible!important;
      background-size:contain!important;
      background-position:center!important;
      background-repeat:no-repeat!important;
      border:0!important;
      box-shadow:none!important;
      filter:drop-shadow(0 6px 14px rgba(140,80,60,.12))!important;
    }
    .sticker-wrap img,.stk img,.sticker img,.mini-stk img,.bg-stk-left img,.bg-stk-right img{
      display:block!important;
      position:static!important;
      width:100%!important;
      height:100%!important;
      object-fit:contain!important;
      object-position:center!important;
      border-radius:0!important;
    }
    .sk1{width:156px!important;height:184px!important;top:8px!important;right:8px!important;border-radius:0!important;}
    .sk2{width:118px!important;height:138px!important;top:170px!important;left:12px!important;}
    .sk3{width:118px!important;height:138px!important;right:14px!important;bottom:18px!important;}
    .sk4{width:100px!important;height:122px!important;left:16px!important;bottom:20px!important;opacity:.9;}
    body{transition:opacity .35s ease,transform .35s ease;}
    body.page-leaving{opacity:0;transform:translateY(8px);}
    .nav-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:28px;}
    .next-btn{
      padding:13px 34px;border:1.5px solid rgba(176,125,98,.28);
      border-radius:999px;background:linear-gradient(135deg,rgba(253,246,238,.92) 0%,rgba(245,213,192,.58) 100%);
      color:var(--brown-dk);font-family:'Lora',serif;font-size:.95rem;font-weight:500;
      letter-spacing:.3px;cursor:pointer;transition:all .32s cubic-bezier(.22,.8,.36,1);
      box-shadow:0 2px 0 rgba(210,170,140,.22),0 6px 20px rgba(140,80,60,.07);
    }
    .next-btn:hover{background:var(--brown-dk);color:var(--cream);border-color:var(--brown-dk);transform:translateY(-2px);box-shadow:0 8px 24px rgba(92,61,46,.15);}
    @media(max-width:480px){.next-btn{max-width:100%;padding:12px 26px;font-size:.9rem;}}
  </style>
</head>
<body>

  <div class="paper-grain"></div>
  <div class="margin-line"></div>

  <!-- bg decos -->
  <div class="deco" style="top:16%;left:3.5%;font-size:1rem;animation-delay:.4s;">✦</div>
  <div class="deco" style="top:52%;right:3%;font-size:1.3rem;animation-delay:2s;">♡</div>
  <div class="deco" style="top:78%;left:4%;font-size:.85rem;animation-delay:1.2s;">✿</div>

  <section class="page">
    <div class="layout">

      <!-- LEFT -->
      <div class="left">
        <div class="page-label">🌙 a few honest things</div>
        <h1 class="heading"><em>a few honest things</em></h1>

        <div class="journal-card">
          <div class="card-tape"></div>
          <div class="terminal" id="terminal"></div>
        </div>

        <p class="card-footnote">— things i don't usually say out loud, but meant every word.</p>
        <div class="nav-row">
          <button class="next-btn" type="button" data-page="reminders-page.html">← back</button>
          <button class="next-btn" type="button" data-page="letter-page.html">next page →</button>
        </div>
      </div>

      <!-- RIGHT: sticker canvas -->
      <div class="right">

        <!-- S1 big portrait -->
        <div class="stk sk1"><img src="assets/stickers/her-music.png" alt=""></div>

        <!-- S2 thoughtful pose -->
        <div class="stk sk2"><img src="assets/stickers/her-sleepy.png" alt=""></div>

        <!-- S3 sitting girl -->
        <div class="stk sk3"><img src="assets/stickers/her-finger-heart.png" alt=""></div>

        <!-- S2 peace-sign -->
        <div class="stk sk4"><img src="assets/stickers/her-cooking.png" alt=""></div>

        <!-- right column decos -->
        <div class="r-deco" style="top:42%;left:46%;animation-delay:.6s;">✦</div>
        <div class="r-deco" style="top:24%;left:20%;animation-delay:2s;font-size:.8rem;">♡</div>
        <div class="r-deco" style="bottom:18%;right:42%;animation-delay:3.2s;font-size:.85rem;">◦</div>
      </div>

    </div>
  </section>

  <script>
    // Thought lines — per master brief
    // Line 1 uses caveat-style (handwritten, warmer)
    // Rest use Lora (mature, sincere)
    const lines = [
      { text: "sometimes i randomly miss talking to you.",        style: "caveat-style" },
      { text: "talking to you genuinely makes days feel lighter.", style: "" },
      { text: "i really respect the kind of person you are.",      style: "" },
      { text: "you've become an important part of my everyday life.", style: "" },
      { text: "even small conversations with you stay in my head.", style: "" },
      { text: "you feel comforting in a very peaceful way.",        style: "caveat-style" },
    ];

    const terminal = document.getElementById("terminal");
    let idx = 0;

    function nextLine(){
      if(idx >= lines.length) return;

      const {text, style} = lines[idx];
      const div = document.createElement("div");
      div.classList.add("thought-line");
      if(style) div.classList.add(style);

      // cursor
      const cur = document.createElement("span");
      cur.classList.add("cursor");
      div.appendChild(cur);
      terminal.appendChild(div);

      // trigger reveal animation
      div.style.animationDelay = "0s";

      let c = 0;
      const speed = style === "caveat-style" ? 44 : 38;

      function typeChar(){
        if(c < text.length){
          div.insertBefore(document.createTextNode(text.charAt(c)), cur);
          c++;
          setTimeout(typeChar, speed);
        } else {
          cur.remove();
          idx++;
          // pause between lines — longer after emotional lines
          const pause = (idx === 3 || idx === 5) ? 1400 : 1000;
          setTimeout(nextLine, pause);
        }
      }

      setTimeout(typeChar, 60);
    }

    window.addEventListener("DOMContentLoaded", () => {
      setTimeout(nextLine, 800);
    });
    document.querySelectorAll("[data-page]").forEach((button) => {
      button.addEventListener("click", (event) => {
        document.body.classList.add("page-leaving");
        setTimeout(() => { window.location.href = event.currentTarget.dataset.page; }, 320);
      });
    });
  </script>

</body>
</html>
