<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eid Scrapbook Opening</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Caveat:wght@400;500;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --cream:#fdf6ee;
      --cream-warm:#f9efe3;
      --peach-soft:#f5d5c0;
      --pink-pastel:#f2c4c4;
      --beige:#e8d5c0;
      --brown-soft:#b07d62;
      --text-warm:#5c3d2e;
      --text-mid:#8a6550;
      --text-light:#c4a08a;
    }
    body{width:100%;height:100vh;overflow:hidden;font-family:'Lora',serif;background-color:var(--cream);position:relative;color:var(--text-warm);}
    .paper-base{position:absolute;inset:0;background:radial-gradient(ellipse at 20% 10%,rgba(245,213,192,.45) 0%,transparent 45%),radial-gradient(ellipse at 80% 85%,rgba(242,196,196,.30) 0%,transparent 40%),radial-gradient(ellipse at 60% 40%,rgba(255,243,230,.55) 0%,transparent 55%),linear-gradient(160deg,#fdf6ee 0%,#f9ede0 50%,#fceee4 100%);pointer-events:none;z-index:0;}
    .grain{position:absolute;inset:0;background-image:url("https://www.transparenttextures.com/patterns/cream-paper.png");opacity:.18;pointer-events:none;z-index:1;}
    .vignette{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 55%,rgba(180,130,100,.10) 100%);pointer-events:none;z-index:2;}

    /* ── dust ── */
    .dust{position:absolute;border-radius:50%;background:var(--peach-soft);opacity:0;animation:dustFloat linear infinite;z-index:2;}
    @keyframes dustFloat{0%{transform:translateY(105vh) scale(1);opacity:0;}10%{opacity:.18;}90%{opacity:.10;}100%{transform:translateY(-10vh) scale(.7);opacity:0;}}

    /* ── corner doodles ── */
    .corner-doodle{position:absolute;z-index:3;pointer-events:none;opacity:.55;}
    .cd-tl{top:0;left:0;width:140px;height:140px;}
    .cd-br{bottom:0;right:0;width:140px;height:140px;transform:rotate(180deg);}

    /* ── paper decos ── */
    .paper-deco{position:absolute;z-index:3;font-size:1.1rem;opacity:.30;pointer-events:none;animation:gentleSway 6s ease-in-out infinite;color:var(--brown-soft);font-family:'Caveat',cursive;}
    @keyframes gentleSway{0%,100%{transform:rotate(-4deg) scale(1);}50%{transform:rotate(4deg) scale(1.08);}}

    /* ── STICKERS ── */
    /* 
      Sheet 1 (s1 var) = big portrait sticker (single image, image 1) 
      Sheet 2 (s2 var) = watercolor sheet with 7 poses (image 2)
      Sheet 3 (s3 var) = chibi white bg sheet with 8 poses (image 3)
      
      We crop specific characters using background-image + background-position + background-size.
      Each sticker is a div with overflow:hidden showing one character from the sheet.
    */

    .sticker{
      position:absolute;
      z-index:6;
      pointer-events:none;
      user-select:none;
      overflow:hidden;
      filter:drop-shadow(0 5px 16px rgba(140,80,60,.16));
    }

    /* TOP LEFT — Sheet 3, top-left cheerful jumping girl */
    .s1{
      width:120px; height:130px;
      top:7%; left:4%;
      animation:floatA 8s ease-in-out infinite;
      background-image:url("assets/stickers/her-cooking.png");
      background-size:370% auto;
      background-position:1% 2%;
      background-repeat:no-repeat;
      border-radius:12px;
    }

    /* BOTTOM LEFT — Sheet 3, bottom-left sitting boba girl */
    .s2{
      width:110px; height:115px;
      bottom:8%; left:5%;
      animation:floatB 9s ease-in-out infinite;
      background-image:url("assets/stickers/her-tired.png");
      background-size:370% auto;
      background-position:1% 92%;
      background-repeat:no-repeat;
      border-radius:12px;
    }

    /* TOP RIGHT — Sheet 1 = the big portrait sticker (use whole image) */
    .s3{
      width:138px; height:138px;
      top:5%; right:4%;
      animation:floatC 10s ease-in-out infinite;
      border-radius:16px;
      overflow:hidden;
    }
    .s3 img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;}

    /* BOTTOM RIGHT — Sheet 2, bottom-right smiling girl */
    .s4{
      width:115px; height:115px;
      bottom:7%; right:5%;
      animation:floatA 11s ease-in-out infinite 1.5s;
      background-image:url("assets/stickers/her-hmph.png");
      background-size:320% auto;
      background-position:95% 95%;
      background-repeat:no-repeat;
      border-radius:12px;
    }

    @keyframes floatA{0%,100%{transform:translateY(0px) rotate(-2deg);}50%{transform:translateY(-13px) rotate(-2deg);}}
    @keyframes floatB{0%,100%{transform:translateY(0px) rotate(2.5deg);}50%{transform:translateY(-10px) rotate(2.5deg);}}
    @keyframes floatC{0%,100%{transform:translateY(0px) rotate(1.5deg);}50%{transform:translateY(-15px) rotate(1.5deg);}}

    /* ── main container ── */
    .container{position:relative;z-index:5;width:100%;height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:30px 24px;}

    /* ── journal card ── */
    .journal-card{background:rgba(255,250,244,.75);border:1.5px solid rgba(200,160,130,.20);border-radius:18px;padding:42px 48px 36px;max-width:600px;width:100%;box-shadow:0 2px 0 rgba(210,170,140,.18),0 8px 32px rgba(160,100,70,.08),inset 0 1px 0 rgba(255,255,255,.8);backdrop-filter:blur(4px);position:relative;animation:cardIn 1.2s cubic-bezier(.22,.8,.36,1) forwards;opacity:0;transform:translateY(16px);}
    @keyframes cardIn{to{opacity:1;transform:translateY(0);}}
    .card-tape{position:absolute;top:-11px;left:50%;transform:translateX(-50%) rotate(-1deg);width:72px;height:22px;background:rgba(245,213,192,.78);border-radius:3px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
    .card-lines{position:absolute;inset:0;border-radius:18px;overflow:hidden;pointer-events:none;opacity:.06;background-image:repeating-linear-gradient(to bottom,transparent,transparent 31px,var(--brown-soft) 31px,var(--brown-soft) 32px);background-position:0 52px;}

    /* ── typing ── */
    .typing{width:100%;display:flex;flex-direction:column;align-items:center;gap:16px;min-height:120px;position:relative;z-index:1;}
    .line{opacity:0;transform:translateY(6px);animation:lineReveal .7s cubic-bezier(.22,.8,.36,1) forwards;}
    .line-1{font-family:'Caveat',cursive;font-size:1.35rem;font-weight:500;color:var(--brown-soft);letter-spacing:.4px;}
    .line-2{font-family:'Lora',serif;font-style:italic;font-size:1rem;color:var(--text-mid);letter-spacing:.3px;}
    .line-3{font-family:'Lora',serif;font-size:1.1rem;font-weight:500;color:var(--text-warm);margin-top:4px;}
    @keyframes lineReveal{to{opacity:1;transform:translateY(0);}}
    .cursor{display:inline-block;width:2px;height:1.1em;background:var(--brown-soft);margin-left:2px;vertical-align:middle;animation:blink .85s step-end infinite;}
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

    body{transition:opacity .35s ease,transform .35s ease;}
    body.page-leaving{opacity:0;transform:translateY(8px);}

    /* ── small rotating text ── */
    .small-text{margin-top:10px;min-height:22px;font-family:'Caveat',cursive;font-size:1rem;color:var(--text-light);letter-spacing:.5px;transition:opacity .45s ease;position:relative;z-index:1;}

    /* ── enter button ── */
    .enter-btn{margin-top:28px;padding:13px 36px;border:1.5px solid rgba(176,125,98,.30);border-radius:999px;background:linear-gradient(135deg,rgba(253,246,238,.9) 0%,rgba(245,213,192,.55) 100%);color:var(--text-warm);font-family:'Lora',serif;font-size:.95rem;font-weight:500;letter-spacing:.3px;cursor:pointer;transition:all .35s cubic-bezier(.22,.8,.36,1);opacity:0;transform:translateY(10px);pointer-events:none;box-shadow:0 2px 0 rgba(210,170,140,.25),0 6px 20px rgba(160,100,70,.08);position:relative;z-index:1;}
    .enter-btn.show{opacity:1;transform:translateY(0);pointer-events:auto;}
    .enter-btn:hover{background:linear-gradient(135deg,rgba(245,213,192,.85) 0%,rgba(242,196,196,.55) 100%);transform:translateY(-2px);box-shadow:0 2px 0 rgba(210,170,140,.25),0 10px 28px rgba(160,100,70,.12);}

    /* ── mobile ── */
    @media(max-width:768px){
      .journal-card{padding:36px 26px 28px;border-radius:16px;}
      .line-1{font-size:1.18rem;}
      .line-2{font-size:.9rem;}
      .line-3{font-size:.98rem;}
      .small-text{font-size:.9rem;}
      .s1{width:85px;height:90px;top:5%;left:2%;}
      .s2{width:78px;height:82px;bottom:6%;left:2%;}
      .s3{width:90px;height:90px;top:4%;right:2%;}
      .s4{width:82px;height:82px;bottom:5%;right:2%;}
      .cd-tl,.cd-br{width:90px;height:90px;}
      .enter-btn{padding:12px 28px;font-size:.88rem;}
    }
    @media(max-width:380px){
      .s1,.s2,.s4{display:none;}
      .s3{width:80px;height:80px;top:3%;right:1%;}
    }

    /* sticker refresh: full transparent PNGs, placed as soft scrapbook accents */
    .sticker-wrap,.stk,.sticker,.mini-stk,.bg-stk-left,.bg-stk-right{
      overflow:visible!important;
      background-size:contain!important;
      background-position:center!important;
      background-repeat:no-repeat!important;
      border:0!important;
      box-shadow:none!important;
      filter:drop-shadow(0 6px 14px rgba(140,80,60,.12))!important;
    }
    .sticker-wrap img,.stk img,.sticker img,.mini-stk img,.bg-stk-left img,.bg-stk-right img{
      display:block!important;
      position:static!important;
      width:100%!important;
      height:100%!important;
      object-fit:contain!important;
      object-position:center!important;
      border-radius:0!important;
    }
    .s1{width:116px!important;height:140px!important;top:5%!important;left:4%!important;}
    .s2{width:112px!important;height:136px!important;bottom:6%!important;left:5%!important;}
    .s3{width:126px!important;height:148px!important;top:4%!important;right:5%!important;border-radius:0!important;}
    .s4{width:108px!important;height:132px!important;bottom:6%!important;right:5%!important;}
  </style>
</head>
<body>

  <div class="paper-base"></div>
  <div class="grain"></div>
  <div class="vignette"></div>

  <!-- corner doodles -->
  <div class="corner-doodle cd-tl">
    <svg viewBox="0 0 140 140" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M10 10 Q40 8 70 25 Q55 55 20 65" stroke="#c4956a" stroke-width="1.2" fill="none" stroke-dasharray="4 3" opacity=".45"/>
      <circle cx="18" cy="18" r="3" fill="#f2c4c4" opacity=".6"/>
      <circle cx="42" cy="12" r="2" fill="#c4956a" opacity=".4"/>
      <circle cx="12" cy="45" r="1.5" fill="#f2c4c4" opacity=".5"/>
      <text x="55" y="30" font-family="serif" font-size="14" fill="#c4956a" opacity=".4">✦</text>
      <text x="22" y="58" font-family="serif" font-size="10" fill="#f2c4c4" opacity=".5">♡</text>
    </svg>
  </div>
  <div class="corner-doodle cd-br">
    <svg viewBox="0 0 140 140" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M10 10 Q40 8 70 25 Q55 55 20 65" stroke="#c4956a" stroke-width="1.2" fill="none" stroke-dasharray="4 3" opacity=".45"/>
      <circle cx="18" cy="18" r="3" fill="#f2c4c4" opacity=".6"/>
      <circle cx="42" cy="12" r="2" fill="#c4956a" opacity=".4"/>
      <text x="55" y="30" font-family="serif" font-size="14" fill="#c4956a" opacity=".4">✦</text>
      <text x="22" y="58" font-family="serif" font-size="10" fill="#f2c4c4" opacity=".5">♡</text>
    </svg>
  </div>

  <!-- paper decos -->
  <div class="paper-deco" style="top:38%;left:3%;animation-delay:.5s;font-size:.9rem;">✦</div>
  <div class="paper-deco" style="top:55%;right:4%;animation-delay:1.2s;font-size:1.3rem;">♡</div>
  <div class="paper-deco" style="top:20%;left:22%;animation-delay:2s;font-size:.8rem;">◦</div>
  <div class="paper-deco" style="top:75%;left:30%;animation-delay:1s;">✿</div>
  <div class="paper-deco" style="top:30%;right:18%;animation-delay:2.5s;font-size:.85rem;">◦</div>

  <!-- dust -->
  <div class="dust" style="width:3px;height:3px;left:12%;animation-duration:18s;"></div>
  <div class="dust" style="width:4px;height:4px;left:38%;animation-duration:22s;animation-delay:4s;"></div>
  <div class="dust" style="width:2px;height:2px;left:65%;animation-duration:16s;animation-delay:2s;"></div>
  <div class="dust" style="width:3px;height:3px;left:82%;animation-duration:20s;animation-delay:7s;"></div>

      <!-- STICKERS -->
  <div class="s1 sticker"></div>
      <div class="s2 sticker"></div>
      <!-- s3: big portrait — full image embed (use soft / happy pose only) -->
      <div class="sticker s3"><img src="assets/stickers/her-yay.png" alt=""></div>
  <div class="s4 sticker"></div>

  <!-- content -->
  <div class="container">
    <div class="journal-card">
      <div class="card-tape"></div>
      <div class="card-lines"></div>
      <div class="typing" id="typing"></div>
      <div class="small-text" id="smallText"></div>
      <button class="enter-btn" id="enterBtn">open scrapbook ✦</button>
    </div>
  </div>

  <script>
    const typing=document.getElementById("typing");
    const smallText=document.getElementById("smallText");
    const enterBtn=document.getElementById("enterBtn");
    const lines=[
      {text:"thoda sa effort\u2026 bas mere bestie ke liye.",cls:"line line-1"},
      {text:"soft little memories, loading\u2026",cls:"line line-2"},
      {text:"welcome, Rabiya \uD83C\uDF19",cls:"line line-3"},
    ];
    const rotatingTexts=["collecting tiny moments\u2026","preparing little smiles\u2026","adding warm lights\u2026","carefully made with duas\u2026","making this feel cozy\u2026"];
    let currentLine=0;
    function showLine(){
      if(currentLine>=lines.length){setTimeout(()=>enterBtn.classList.add("show"),500);return;}
      const{text,cls}=lines[currentLine];
      const div=document.createElement("div");
      cls.split(" ").forEach(c=>div.classList.add(c));
      const cursor=document.createElement("span");
      cursor.classList.add("cursor");
      div.appendChild(cursor);
      typing.appendChild(div);
      let char=0;
      const speed=currentLine===0?48:currentLine===1?42:55;
      function typeChar(){
        if(char<text.length){div.insertBefore(document.createTextNode(text.charAt(char)),cursor);char++;setTimeout(typeChar,speed);}
        else{cursor.remove();currentLine++;setTimeout(showLine,currentLine===1?700:900);}
      }
      setTimeout(typeChar,80);
    }
    setTimeout(showLine,900);
    let rotateIndex=0;
    function rotateText(){
      smallText.style.opacity=0;
      setTimeout(()=>{smallText.innerText=rotatingTexts[rotateIndex];smallText.style.opacity=".85";rotateIndex=(rotateIndex+1)%rotatingTexts.length;},420);
    }
    rotateText();
    setInterval(rotateText,3000);
    enterBtn.addEventListener("click", () => {
      document.body.classList.add("page-leaving");
      setTimeout(() => { window.location.href = "landing-page.html"; }, 320);
    });
  </script>
</body>
</html>
